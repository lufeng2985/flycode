name: 🛠 Android CI / Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - 'main'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Cache pub deps
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5
          cache: true

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: ✅ Run tests
        run: flutter test --coverage

      - name: 🏗️ Build debug APK (unsigned)
        run: flutter build apk --debug

      - name: 📦 Prepare artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/*.apk artifacts/

      - name: 📝 Prepare release notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          awk -v tag="$TAG" '
            $0 ~ "^## " tag "([[:space:]]-|$)" { found = 1 }
            found && $0 ~ "^## v[0-9]" && $0 !~ "^## " tag "([[:space:]]-|$)" { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "Pre-built debug APK for $TAG" > release_notes.md
          fi

      - name: ⬆️ Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flycode-debug-apk
          path: artifacts/*.apk
          
      - name: 🏷️ Create or update Release (tag only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: ncipollo/release-action@v1.16.0
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          artifacts: artifacts/*
          bodyFile: release_notes.md
          token: ${{ secrets.GITHUB_TOKEN }}
